<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section BMW</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .hero-section {
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh; 
            display: flex;
            justify-content: center; 
            align-items: center;    
        }

        .hero-content {
            display: flex;
            align-items: center; 
            padding: 20px;
        }

        .logo img {
            display: block;
            width: 100px; 
            height: auto;
        }

        .text-brand {
            padding-left: 10px;
            font-family: sans-serif;
            color: white; 
        }

        .brand-name {
            font-size: 32px;
            font-weight: bold;
            padding-bottom: 0px;
        }

        .instruction {
            font-size: 18px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="hero-content">
            
            <div class="logo">
                <img src="logo.png" usemap="#logotostart" alt="Logo BMW">
                <map name="logotostart">
                    <area shape="circle" coords="50, 50, 50" href="gallery.html" alt="Start">
                </map>
            </div>

            <div class="text-brand">
                <span class="brand-name">| BMW Indonesia</span>
                <p class="instruction">Klik Logo Untuk Mulai</p>
            </div>

        </div>
    </header>

</body>
</html>
